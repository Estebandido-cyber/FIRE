<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #18181f;
    --surface: #1e1e28;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.15);
    --text: #f0f0f5;
    --muted: rgba(240,240,245,0.45);
    --subtle: rgba(240,240,245,0.2);

    --accent-tracker: #00e5a0;
    --accent-tracker-dim: rgba(0,229,160,0.12);
    --accent-tracker-glow: rgba(0,229,160,0.25);

    --accent-calc: #7b8fff;
    --accent-calc-dim: rgba(123,143,255,0.12);
    --accent-calc-glow: rgba(123,143,255,0.25);

    --accent-planner: #ffd166;
    --accent-planner-dim: rgba(255,209,102,0.12);
    --accent-planner-glow: rgba(255,209,102,0.25);

    --accent-fire: #ff6b6b;
    --accent-fire-dim: rgba(255,107,107,0.12);
    --accent-fire-glow: rgba(255,107,107,0.25);
  }

  html { font-size: 16px; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    padding: 0 0 60px;
  }

  /* ─── background mesh ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(123,143,255,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 35% at 80% 80%, rgba(255,107,107,0.05) 0%, transparent 55%),
      radial-gradient(ellipse 40% 30% at 60% 30%, rgba(0,229,160,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* ─── grid texture ─── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 520px;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* ─── header ─── */
  header {
    padding: 52px 0 36px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  .logo-block {}
  .logo-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--subtle);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .logo-title {
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #f0f0f5 0%, rgba(240,240,245,0.6) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-meta {
    text-align: right;
    padding-top: 6px;
  }
  .date-display {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
  }

  /* ─── section label ─── */
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--subtle);
    text-transform: uppercase;
    margin: 0 0 14px;
  }

  /* ─── tiles grid ─── */
  .tiles {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }

  /* ─── tile ─── */
  .tile {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 22px 20px 18px;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    min-height: 190px;
    overflow: hidden;
    transition: border-color 0.25s, transform 0.2s;
  }

  .tile::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 20px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .tile:hover { transform: translateY(-2px); }
  .tile:hover::before { opacity: 1; }
  .tile:active { transform: translateY(0) scale(0.98); }

  .tile-tracker::before { background: radial-gradient(ellipse at top left, var(--accent-tracker-dim), transparent 70%); }
  .tile-tracker:hover { border-color: var(--accent-tracker-glow); }

  .tile-calc::before { background: radial-gradient(ellipse at top left, var(--accent-calc-dim), transparent 70%); }
  .tile-calc:hover { border-color: var(--accent-calc-glow); }

  .tile-planner::before { background: radial-gradient(ellipse at top left, var(--accent-planner-dim), transparent 70%); }
  .tile-planner:hover { border-color: var(--accent-planner-glow); }

  .tile-fire::before { background: radial-gradient(ellipse at top left, var(--accent-fire-dim), transparent 70%); }
  .tile-fire:hover { border-color: var(--accent-fire-glow); }

  /* ─── tile icon ─── */
  .tile-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    margin-bottom: 14px;
    position: relative;
    z-index: 1;
    flex-shrink: 0;
  }
  .tile-tracker .tile-icon { background: var(--accent-tracker-dim); }
  .tile-calc .tile-icon    { background: var(--accent-calc-dim); }
  .tile-planner .tile-icon { background: var(--accent-planner-dim); }
  .tile-fire .tile-icon    { background: var(--accent-fire-dim); }

  /* ─── tile name ─── */
  .tile-name {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.01em;
    margin-bottom: 12px;
    position: relative;
    z-index: 1;
  }
  .tile-tracker .tile-name { color: var(--accent-tracker); }
  .tile-calc .tile-name    { color: var(--accent-calc); }
  .tile-planner .tile-name { color: var(--accent-planner); }
  .tile-fire .tile-name    { color: var(--accent-fire); }

  /* ─── tile stats ─── */
  .tile-stats {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: relative;
    z-index: 1;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .stat-label {
    font-size: 9.5px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.1em;
    color: var(--subtle);
    text-transform: uppercase;
  }
  .stat-value {
    font-family: 'DM Mono', monospace;
    font-size: 17px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.15;
  }
  .stat-value.big {
    font-size: 21px;
  }
  .stat-value.dim {
    font-size: 14px;
    color: var(--muted);
  }

  /* ─── divider inside tile ─── */
  .stat-divider {
    width: 100%;
    height: 1px;
    background: var(--border);
    margin: 2px 0;
  }

  /* ─── tile arrow ─── */
  .tile-arrow {
    position: absolute;
    bottom: 16px;
    right: 18px;
    font-size: 14px;
    color: var(--subtle);
    transition: color 0.2s, transform 0.2s;
    z-index: 1;
  }
  .tile:hover .tile-arrow {
    color: var(--muted);
    transform: translate(2px, -2px);
  }

  /* ─── no data state ─── */
  .no-data {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--subtle);
    font-style: italic;
  }

  /* ─── pulse dot ─── */
  .live-dot {
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
    margin-right: 5px;
    animation: pulse 2s infinite;
    vertical-align: middle;
    position: relative;
    top: -1px;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  /* ─── last save ─── */
  .tile-footer {
    margin-top: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--subtle);
    letter-spacing: 0.05em;
    position: relative;
    z-index: 1;
  }

  /* ─── bottom bar ─── */
  .bottom-bar {
    margin-top: 28px;
    padding: 18px 20px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .bottom-label {
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .refresh-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    white-space: nowrap;
  }
  .refresh-btn:hover {
    border-color: var(--border-hover);
    color: var(--text);
  }

  /* ─── entry animations ─── */
  .tile { animation: fadeUp 0.5s both; }
  .tile:nth-child(1) { animation-delay: 0.05s; }
  .tile:nth-child(2) { animation-delay: 0.1s; }
  .tile:nth-child(3) { animation-delay: 0.15s; }
  .tile:nth-child(4) { animation-delay: 0.2s; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  header { animation: fadeUp 0.4s both; }
  .bottom-bar { animation: fadeUp 0.5s 0.25s both; }

  /* ─── responsive ─── */
  @media (max-width: 380px) {
    .tiles { grid-template-columns: 1fr; }
    .tile { min-height: auto; }
    .logo-title { font-size: 28px; }
  }
</style>
</head>
<body>

<div class="wrap">

  <header>
    <div class="logo-block">
      <div class="logo-eyebrow">personal dashboard</div>
      <div class="logo-title">Life Hub</div>
    </div>
    <div class="header-meta">
      <div class="date-display" id="date-display"></div>
    </div>
  </header>

  <div class="section-label">your apps</div>

  <div class="tiles">

    <!-- XPENSE TRACKER -->
    <a class="tile tile-tracker" href="XPENSE_TRACKER.html">
      <div class="tile-icon">💳</div>
      <div class="tile-name">Xpenser</div>
      <div class="tile-stats" id="stats-tracker">
        <div class="no-data">Loading…</div>
      </div>
      <div class="tile-footer" id="footer-tracker"></div>
      <div class="tile-arrow">↗</div>
    </a>

    <!-- XPENSES CALCULATOR -->
    <a class="tile tile-calc" href="XPENSES_CALCULATOR.html">
      <div class="tile-icon">🧮</div>
      <div class="tile-name">Calculator</div>
      <div class="tile-stats" id="stats-calc">
        <div class="no-data">Loading…</div>
      </div>
      <div class="tile-footer" id="footer-calc"></div>
      <div class="tile-arrow">↗</div>
    </a>

    <!-- WEEK PLANNER -->
    <a class="tile tile-planner" href="WEEK_PLANNER.html">
      <div class="tile-icon">📅</div>
      <div class="tile-name">Week Planner</div>
      <div class="tile-stats" id="stats-planner">
        <div class="no-data">Loading…</div>
      </div>
      <div class="tile-footer" id="footer-planner"></div>
      <div class="tile-arrow">↗</div>
    </a>

    <!-- FIRE SIM -->
    <a class="tile tile-fire" href="FIRE_SIM.html">
      <div class="tile-icon">🔥</div>
      <div class="tile-name">FIRE Sim</div>
      <div class="tile-stats" id="stats-fire">
        <div class="no-data">Loading…</div>
      </div>
      <div class="tile-footer" id="footer-fire"></div>
      <div class="tile-arrow">↗</div>
    </a>

  </div>

  <div class="bottom-bar">
    <span class="bottom-label"><span class="live-dot" style="color:#00e5a0;"></span>live from local storage</span>
    <button class="refresh-btn" onclick="loadAll()">↺ Refresh</button>
  </div>

</div>

<script>
// ─── date display ─────────────────────────────────────────────────
(function() {
  const d = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('date-display').innerHTML =
    days[d.getDay()] + '<br>' +
    d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
})();

// ─── helpers ──────────────────────────────────────────────────────
function fmt(n) {
  if (isNaN(n) || n === null || n === undefined) return '—';
  return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(n);
}
function fmtCOP(n) {
  if (isNaN(n) || n === null || n === undefined) return '—';
  return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(n);
}
function safeGet(key) {
  try { return localStorage.getItem(key); } catch(e) { return null; }
}
function safeParse(v) {
  try { return v ? JSON.parse(v) : null; } catch(e) { return null; }
}
function statHTML(label, value, big) {
  return `<div class="stat">
    <div class="stat-label">${label}</div>
    <div class="stat-value${big ? ' big' : ''}">${value}</div>
  </div>`;
}
function noDataHTML(msg) {
  return `<div class="no-data">${msg || 'No data yet'}</div>`;
}
function fmtSaveTime(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    const now = new Date();
    const diff = Math.floor((now - d) / 60000);
    if (diff < 1) return 'saved just now';
    if (diff < 60) return `saved ${diff}m ago`;
    const h = Math.floor(diff / 60);
    if (h < 24) return `saved ${h}h ago`;
    return `saved ${Math.floor(h/24)}d ago`;
  } catch(e) { return ''; }
}

// ─── XPENSE TRACKER ───────────────────────────────────────────────
function loadTracker() {
  const raw = safeGet('depenses_data_v1');
  const data = safeParse(raw);
  const lastSave = safeGet('depenses_last_save');
  const el = document.getElementById('stats-tracker');
  const foot = document.getElementById('footer-tracker');

  if (!data) { el.innerHTML = noDataHTML('Open tracker to start'); return; }

  const now = new Date();
  const curMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const curYear = String(now.getFullYear());

  let monthTotal = 0, yearTotal = 0;

  Object.entries(data).forEach(([dateKey, entries]) => {
    if (!Array.isArray(entries)) return;
    const daySum = entries.reduce((s, e) => s + (parseFloat(e.amt) || 0), 0);
    if (dateKey.startsWith(curYear)) yearTotal += daySum;
    if (dateKey.startsWith(curMonth)) monthTotal += daySum;
  });

  el.innerHTML =
    statHTML('This month', fmt(monthTotal), true) +
    '<div class="stat-divider"></div>' +
    statHTML('This year', fmt(yearTotal));

  foot.textContent = fmtSaveTime(lastSave);
}

// ─── XPENSES CALCULATOR ───────────────────────────────────────────
function loadCalc() {
  const raw = safeGet('xpenses_calculator_v1');
  const states = safeParse(raw);
  const el = document.getElementById('stats-calc');

  if (!states) { el.innerHTML = noDataHTML('Open calculator to start'); return; }

  // Try to find "left at end of month" from now and fire tabs
  let nowLeft = null, fireLeft = null;

  // States is typically an object keyed by tab name or an array
  // Try common patterns
  const tryExtract = (obj) => {
    if (!obj) return null;
    // look for fields like: left, remaining, balance, leftAtEnd
    const candidates = ['left', 'leftAtEnd', 'remaining', 'balance', 'monthlySurplus', 'surplus'];
    for (const k of candidates) {
      if (typeof obj[k] === 'number') return obj[k];
    }
    // Try income - expenses pattern
    const income = obj.income || obj.salary || obj.totalIncome || 0;
    const expenses = obj.expenses || obj.totalExpenses || obj.total || 0;
    if (income > 0 && expenses > 0) return income - expenses;
    return null;
  };

  if (Array.isArray(states)) {
    nowLeft = tryExtract(states[0]);
    fireLeft = tryExtract(states[1]);
  } else if (typeof states === 'object') {
    const keys = Object.keys(states);
    const nowKey = keys.find(k => k.toLowerCase().includes('now')) || keys[0];
    const fireKey = keys.find(k => k.toLowerCase().includes('fire')) || keys[1];
    nowLeft = tryExtract(states[nowKey]);
    fireLeft = tryExtract(states[fireKey]);
  }

  if (nowLeft === null && fireLeft === null) {
    el.innerHTML = noDataHTML('Open calculator to update');
    return;
  }

  let html = '';
  if (nowLeft !== null) html += statHTML('Left / month · now', fmt(nowLeft), true);
  if (nowLeft !== null && fireLeft !== null) html += '<div class="stat-divider"></div>';
  if (fireLeft !== null) html += statHTML('Left / month · FIRE', fmt(fireLeft));

  el.innerHTML = html || noDataHTML('Open calculator to update');
}

// ─── WEEK PLANNER ─────────────────────────────────────────────────
function loadPlanner() {
  const el = document.getElementById('stats-planner');
  const curWeekRaw = safeGet('weekplan_curweek');
  const curWeek = curWeekRaw !== null ? parseInt(curWeekRaw) || 0 : 0;

  let totalHours = 0;
  let hasData = false;

  // Load all 4 weeks and find current week hours
  const weekData = [];
  for (let w = 0; w < 4; w++) {
    const raw = safeGet('weekplan_week' + w);
    const places = safeParse(raw) || {};
    weekData.push(places);
  }

  // Count placed blocks in current week
  // Each key is typically "col-slot" and value is an activity id
  const curPlaces = weekData[curWeek] || {};
  const slots = Object.values(curPlaces).filter(v => v && v !== 'empty' && v !== null);
  const totalSlots = slots.length;

  // Estimate hours: assume 30min or 1h slots — try to detect from acts
  const actsRaw = safeGet('weekplan_acts');
  const acts = safeParse(actsRaw) || [];

  // Count distinct activity blocks placed this week
  // Count hours by summing durations if available
  let hoursPlanned = 0;
  if (totalSlots > 0) {
    // Try to sum durations from activities
    const actMap = {};
    acts.forEach(a => { actMap[a.id] = a; });
    let slotHours = 0;
    Object.values(curPlaces).forEach(actId => {
      if (!actId) return;
      const act = actMap[actId];
      if (act && act.duration) slotHours += parseFloat(act.duration) || 0;
      else slotHours += 1; // default 1h per block
    });
    hoursPlanned = slotHours;
    hasData = true;
  } else {
    // check if any week has data
    for (let w = 0; w < 4; w++) {
      if (Object.keys(weekData[w]).length > 0) { hasData = true; break; }
    }
  }

  if (!hasData) { el.innerHTML = noDataHTML('Open planner to start'); return; }

  const weekLabel = `Week ${curWeek + 1}`;
  el.innerHTML =
    statHTML('Current week', weekLabel) +
    '<div class="stat-divider"></div>' +
    statHTML('Hours planned', hoursPlanned > 0 ? hoursPlanned + 'h' : totalSlots + ' blocks', true);
}

// ─── FIRE SIM ─────────────────────────────────────────────────────
function loadFire() {
  const raw = safeGet('fire-sim-v1');
  const state = safeParse(raw);
  const el = document.getElementById('stats-fire');
  const foot = document.getElementById('footer-fire');

  if (!state) { el.innerHTML = noDataHTML('Open FIRE sim to start'); return; }

  // S holds the main numeric state
  const S = state.S || state;
  if (!S) { el.innerHTML = noDataHTML('Run a simulation first'); return; }

  // Try to find French assets, Colombian assets, total
  // Common keys from FIRE sims
  let french = null, colombian = null, total = null;

  // Direct keys
  const frKeys = ['frenchAssets','fr_assets','portfolioFR','portfolioFrance','pea','totalFR','french'];
  const coKeys = ['colombianAssets','co_assets','portfolioCO','portfolioColombia','colombia','totalCO','cop'];
  const totKeys = ['total','totalAssets','netWorth','globalTotal','portfolio','portfolioTotal'];

  for (const k of frKeys) { if (typeof S[k] === 'number') { french = S[k]; break; } }
  for (const k of coKeys) { if (typeof S[k] === 'number') { colombian = S[k]; break; } }
  for (const k of totKeys) { if (typeof S[k] === 'number') { total = S[k]; break; } }

  // If we got nothing useful, try summing PEA + CTO + AV + PEE etc.
  if (french === null) {
    const components = ['pea','cto','av','assuranceVie','pee','livretA','ldds','livrets','cash'];
    let sum = 0; let found = false;
    components.forEach(k => { if (typeof S[k] === 'number') { sum += S[k]; found = true; } });
    if (found) french = sum;
  }

  // Compute total if we have parts
  if (total === null && french !== null && colombian !== null) total = french + colombian;
  if (total === null && french !== null) total = french;

  if (french === null && colombian === null && total === null) {
    el.innerHTML = noDataHTML('Run a simulation first');
    return;
  }

  let html = '';
  if (total !== null) html += statHTML('Total assets', fmt(total), true);
  if (french !== null) html += '<div class="stat-divider"></div>' + statHTML('French portfolio', fmt(french));

  el.innerHTML = html || noDataHTML('Run a simulation first');

  if (state.savedAt) foot.textContent = fmtSaveTime(state.savedAt);
}

// ─── load all ─────────────────────────────────────────────────────
function loadAll() {
  loadTracker();
  loadCalc();
  loadPlanner();
  loadFire();
}

loadAll();
</script>
</body>
</html>
